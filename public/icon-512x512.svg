<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2563eb"/>
  <!-- Fused CN monogram: the C wraps into the N, sharing the middle stroke -->
  <g fill="none" stroke="#fff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <!-- C shape -->
    <path d="M280 140 C180 140, 110 200, 110 256 C110 312, 180 372, 280 372"/>
    <!-- N shape, left vertical merges with C's open ends -->
    <path d="M280 140 L280 372"/>
    <path d="M280 140 L390 372"/>
    <path d="M390 140 L390 372"/>
  </g>
</svg>
